version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups:
      tanstack:
        patterns: ["@tanstack/*"]
      cloudflare:
        patterns: ["@cloudflare/*", "wrangler"]
      simplewebauthn:
        patterns: ["@simplewebauthn/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

name: Deploy

# Pushes to main deploy to the test worker (afk-test on workers.dev).
# Tag pushes (v*) deploy to production (afk.onewheelgeek.net).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        required: true
        default: test
        options: [test, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: jdx/mise-action@v4

      - run: npm ci

      - name: Pick target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.target }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target=production
          else
            target=test
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "→ target=$target"

      - name: Compute version
        id: version
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          hash=$(git rev-parse --short HEAD)
          head_at_tag=$(git rev-list -n1 "$tag" 2>/dev/null || true)
          if [ -n "$head_at_tag" ] && [ "$head_at_tag" = "$(git rev-parse HEAD)" ]; then
            version="$tag"
          else
            version="$tag-$hash"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "→ version=$version"

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --env ${{ steps.target.outputs.target }} --remote

      - name: Build
        run: npx vite build
        env:
          CLOUDFLARE_ENV: ${{ steps.target.outputs.target }}

      - name: Deploy
        run: npx wrangler deploy --var APP_VERSION:"${{ steps.version.outputs.version }}"

name: Deploy

# Pushes to main deploy to the test worker (afk-test on workers.dev).
# Tag pushes (v*) deploy to production (afk.onewheelgeek.net).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        required: true
        default: test
        options: [test, production]

jobs:
  # Re-run lint+test+build before deploying so a broken commit can't ship
  # even via direct `git push origin main`. Cheap belt-and-suspenders on
  # top of the standalone CI workflow.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: npm ci
      - run: mise run lint
      - run: mise run test
      - run: mise run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: jdx/mise-action@v4

      - run: npm ci

      - name: Pick target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.target }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target=production
          else
            target=test
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "→ target=$target"

      - name: Compute version
        id: version
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          hash=$(git rev-parse --short HEAD)
          head_at_tag=$(git rev-list -n1 "$tag" 2>/dev/null || true)
          if [ -n "$head_at_tag" ] && [ "$head_at_tag" = "$(git rev-parse HEAD)" ]; then
            version="$tag"
          else
            version="$tag-$hash"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "→ version=$version"

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --env ${{ steps.target.outputs.target }} --remote

      - name: Build
        run: npx vite build
        env:
          CLOUDFLARE_ENV: ${{ steps.target.outputs.target }}

      # Without --env, wrangler reads top-level config and would deploy a
      # nameless worker with NO D1, NO KV, NO assets, NO cron. The actual
      # bindings live under [env.test] / [env.production] in wrangler.toml.
      - name: Deploy
        run: npx wrangler deploy --env ${{ steps.target.outputs.target }} --var APP_VERSION:"${{ steps.version.outputs.version }}"

      # Smoke-test the just-deployed worker. Doesn't require auth and is a
      # cheap way to know the rollout actually succeeded.
      - name: Smoke test /api/v1/health
        run: |
          if [ "${{ steps.target.outputs.target }}" = "production" ]; then
            url="https://afk.onewheelgeek.net/api/v1/health"
          else
            url="https://afk-test.jeffrey-clement.workers.dev/api/v1/health"
          fi
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$url" | tee /tmp/health.json | grep -q '"status":"ok"'; then
              echo "✓ health check passed"
              exit 0
            fi
            echo "health check attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ health check failed after 5 attempts"
          exit 1

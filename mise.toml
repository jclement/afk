[tools]
node = "22"

[env]
# Local dev state
NODE_ENV = "development"

[tasks.dev]
description = "Run Vite + Worker dev server (Cloudflare vite plugin)"
run = "npm run dev"

[tasks.build]
description = "Production build (Vite + Worker)"
run = "npm run build"

[tasks.test]
description = "Run all tests (unit, integration)"
depends = ["test:unit"]

[tasks."test:unit"]
description = "Vitest with the Cloudflare Workers pool"
run = "npm run test"

[tasks."test:e2e"]
description = "Playwright end-to-end tests"
run = "npm run test:e2e"

[tasks.lint]
description = "Type-check + ESLint"
run = "npm run lint"

[tasks.fmt]
description = "Prettier + ESLint --fix"
run = "npm run fmt"

[tasks."db:migrate"]
description = "Apply D1 migrations locally"
run = "npx wrangler d1 migrations apply DB --env test --local"

[tasks."db:migrate:test"]
description = "Apply D1 migrations to the test database"
run = "npx wrangler d1 migrations apply DB --env test --remote"

[tasks."db:migrate:prod"]
description = "Apply D1 migrations to the production database"
run = "npx wrangler d1 migrations apply DB --env production --remote"

[tasks."db:new"]
description = "Create a new D1 migration file (mise run db:new <name>)"
run = """
#!/bin/bash
if [ -z "$1" ]; then echo "Usage: mise run db:new <name>"; exit 1; fi
next=$(ls migrations/*.sql 2>/dev/null | wc -l | tr -d ' ')
next=$((next + 1))
num=$(printf "%04d" $next)
file="migrations/${num}_$1.sql"
touch "$file"
echo "Created $file"
"""

[tasks."dev:reset"]
description = "Blow away local dev state"
run = """
rm -rf .wrangler/ dist/ node_modules/.vite/ tmp/
"""

[tasks.deploy]
description = "Deploy to the test worker (afk-test on workers.dev)"
run = """
#!/bin/bash
set -e
TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "nohash")
HEAD_AT_TAG=$(git rev-list -n1 "$TAG" 2>/dev/null || true)
CURRENT_HEAD=$(git rev-parse HEAD 2>/dev/null || true)
if [ -n "$HEAD_AT_TAG" ] && [ "$HEAD_AT_TAG" = "$CURRENT_HEAD" ]; then
  VERSION="$TAG"
else
  VERSION="$TAG-$HASH"
fi
if ! git diff --quiet HEAD 2>/dev/null; then
  VERSION="$VERSION (dirty)"
fi
echo "→ Deploying version $VERSION to test"
CLOUDFLARE_ENV=test npx vite build
npx wrangler deploy --var APP_VERSION:"$VERSION"
"""

[tasks."deploy:prod"]
description = "Deploy to production (afk.onewheelgeek.net). Refuses on dirty trees."
run = """
#!/bin/bash
set -e
if ! git diff --quiet HEAD 2>/dev/null; then
  echo "Refusing to deploy a dirty tree to production. Commit or stash first." >&2
  exit 1
fi
TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "nohash")
HEAD_AT_TAG=$(git rev-list -n1 "$TAG" 2>/dev/null || true)
CURRENT_HEAD=$(git rev-parse HEAD 2>/dev/null || true)
if [ -n "$HEAD_AT_TAG" ] && [ "$HEAD_AT_TAG" = "$CURRENT_HEAD" ]; then
  VERSION="$TAG"
else
  VERSION="$TAG-$HASH"
fi
echo "→ Deploying version $VERSION to production"
CLOUDFLARE_ENV=production npx vite build
npx wrangler deploy --var APP_VERSION:"$VERSION"
"""

[tasks.release]
description = "Tag and push a release (CI deploys)"
run = """
#!/bin/bash
set -e
current=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
echo "Current: $current"
major=$(echo $current | sed 's/v//' | cut -d. -f1)
minor=$(echo $current | cut -d. -f2)
patch=$(echo $current | cut -d. -f3)
echo "  1) patch -> v${major}.${minor}.$((patch+1))"
echo "  2) minor -> v${major}.$((minor+1)).0"
echo "  3) major -> v$((major+1)).0.0"
read -p "Choice [1]: " c; c=${c:-1}
case $c in
  1) v="v${major}.${minor}.$((patch+1))" ;;
  2) v="v${major}.$((minor+1)).0" ;;
  3) v="v$((major+1)).0.0" ;;
  *) echo "Invalid"; exit 1 ;;
esac
git tag -a "$v" -m "Release $v"
read -p "Push $v? [Y/n]: " p; p=${p:-Y}
[[ $p =~ ^[Yy]$ ]] && git push origin "$v"
"""
